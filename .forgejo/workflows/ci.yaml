---
name: "CI"

on:
  pull_request:
    branches:
    - "main"
    types:
    - "opened"
    - "synchronize"

jobs:
  ci:
    name: "CI"
    if: "${{ ! github.event.pull_request.draft }}"
    runs-on: "docker"
    container:
      image: "golang:1.26.1-trixie"
      volumes:
      - "go-mod-cache:/go/pkg/mod"
    env:
      BEACON_TEST_VERBOSE: "1"
      BEACON_TEST_COVER: "1"
      BEACON_FAIL_ON_FORMATTING: "1"
    steps:
    - name: "Checkout the repository"
      uses: "https://github.com/taiki-e/checkout-action@v1.4.0" # 2026-01-25
    - name: "Run tests"
      run: "go tool -modfile=tools/tools.mod mage -v test"
    #- name: "Run gosec"
    #  run: "go tool -modfile=tools/tools.mod mage -v gosec"
    - name: "Run go vet"
      run: "go tool -modfile=tools/tools.mod mage -v govet"
    - name: "Check formatting"
      run: "go tool -modfile=tools/tools.mod mage -v gofmt"
    - name: "Run staticcheck"
      run: "go tool -modfile=tools/tools.mod mage -v staticcheck"
    - name: "REUSE Compliance Check"
      uses: "https://github.com/fsfe/reuse-action@v6.0.0"
